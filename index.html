<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
    <title>Dark Pad Pro V5 - Final Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />

    <style>
        [x-cloak] { display: none !important; }
        body { background-color: #050a0f; color: #e2e8f0; font-family: system-ui, sans-serif; overflow: hidden; height: 100vh; }
        .bg-pure-black { background-color: #000000 !important; }
        
        /* Colores de los Marcos */
        .bg-dark-gray { background-color: #1c2833 !important; }
        .bg-dark-orange { background-color: #5d340b !important; }
        .bg-dark-blue { background-color: #153e5a !important; }
        .bg-dark-green { background-color: #145a32 !important; }
        .bg-dark-purple { background-color: #3b1c4a !important; }
        .bg-dark-red { background-color: #641e16 !important; }
        .bg-dark-teal { background-color: #0d3b31 !important; }

        .note-card { border-radius: 1.8rem; height: 170px; border: 1px solid rgba(255,255,255,0.05); transition: all 0.2s; overflow: hidden; position: relative; }
        .is-pinned { border: 2px solid #f97316 !important; box-shadow: 0 0 15px rgba(249,115,22,0.3); }
        .action-bar { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 1.2rem; }
        
        textarea { background: transparent !important; color: white !important; width: 100%; height: 350px; border: none; outline: none; padding: 1.5rem; resize: none; line-height: 1.5; font-weight: 500; }
        input.title-input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); outline: none; color: white; border-radius: 1rem; padding: 0.8rem 1.2rem; width: 100%; font-weight: 800; font-size: 1.1rem; }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body x-data="notesApp()" x-init="init()" :class="config.pureBlack ? 'bg-pure-black' : ''">

    <header class="p-6 pb-2 sticky top-0 z-50 bg-inherit border-b border-white/5">
        <div class="flex justify-between items-center mb-4">
            <div>
                <h1 class="text-xl font-black text-orange-500 italic uppercase tracking-tighter">Dark Pad</h1>
                <p class="text-[9px] font-black text-sky-500 uppercase tracking-widest">Multi-Color Pro</p>
            </div>
            <button @click="ui.showSettings = true" class="p-2 bg-white/5 rounded-full active:scale-75 transition-transform">
                <span class="material-symbols-outlined text-sky-400">settings</span>
            </button>
        </div>
        
        <div class="action-bar p-2 flex items-center justify-between">
            <div class="flex items-center gap-1">
                <button @click="ui.showSearch = !ui.showSearch" class="p-2 active:scale-75"><span class="material-symbols-outlined text-sky-400">search</span></button>
                <input x-show="ui.showSearch" x-model="search" type="text" placeholder="Buscar..." class="w-20 bg-transparent outline-none text-xs text-white">
                <button @click="ui.showMenu = !ui.showMenu" class="p-1 transition-transform active:scale-75" :class="ui.showMenu ? 'rotate-180' : ''">
                    <span class="material-symbols-outlined text-white/40">expand_more</span>
                </button>
            </div>

            <div class="flex items-center gap-2 pr-1">
                <button @click="alert('Archivo Histórico')" class="p-1 active:scale-75"><span class="material-symbols-outlined text-[20px] text-white/60">inventory_2</span></button>
                <button @click="alert('Recordatorio')" class="p-1 active:scale-75"><span class="material-symbols-outlined text-[20px] text-white/60">notifications</span></button>
                <button @click="cambiarTamano()" class="p-1 active:scale-75"><span class="material-symbols-outlined text-[20px] text-white/60">format_size</span></button>
                <button @click="alert('Bloqueado')" class="p-1 active:scale-75"><span class="material-symbols-outlined text-[20px] text-white/60">lock</span></button>
                <div class="w-[1px] h-4 bg-white/10 mx-1"></div>
                <button @click="togglePin()" class="p-1 active:scale-75"><span class="material-symbols-outlined text-[20px] text-orange-500">push_pin</span></button>
                <button @click="borrarNotaRapido()" class="p-1 active:scale-75"><span class="material-symbols-outlined text-[20px] text-red-500">delete</span></button>
                <button @click="volver()" class="p-1 active:scale-75"><span class="material-symbols-outlined text-[20px] text-white/60">arrow_back</span></button>
            </div>
        </div>
    </header>

    <section class="px-6 py-3 bg-white/5 overflow-x-auto whitespace-nowrap hide-scrollbar border-b border-white/5">
        <div class="flex gap-4">
            <template x-for="day in last7Days" :key="day.date">
                <div @click="filterByDate(day.date)" 
                     class="flex flex-col items-center min-w-[45px] p-2.5 rounded-2xl transition-all active:scale-90"
                     :class="selectedDate === day.date ? 'bg-sky-500 text-white' : 'bg-white/5'">
                    <span class="text-[8px] uppercase font-black opacity-50" x-text="day.name"></span>
                    <span class="text-sm font-black" x-text="day.num"></span>
                    <div x-show="day.hasNote" class="w-1 h-1 rounded-full mt-1 bg-orange-500"></div>
                </div>
            </template>
        </div>
    </section>

    <main class="p-4 grid grid-cols-2 gap-4 h-[calc(100vh-230px)] overflow-y-auto pb-32 hide-scrollbar">
        <template x-for="nota in notasFiltradas" :key="nota.id">
            <div class="note-card p-5 flex flex-col justify-between active:scale-95" 
                 :class="[nota.estilo, nota.pinned ? 'is-pinned' : '']"
                 @click="abrirNota(nota)">
                <div>
                    <h4 class="text-[10px] font-black uppercase opacity-60 mb-1 truncate" x-text="nota.titulo || 'Nueva Nota'"></h4>
                    <p class="font-bold line-clamp-3 leading-tight text-white/90" :style="{ fontSize: config.fontSize + 'px' }" x-text="nota.texto || 'Escribir aquí...'"></p>
                </div>
                <div class="flex justify-between items-center opacity-30 text-[8px] font-black uppercase">
                    <span x-text="nota.fecha"></span>
                    <span x-show="nota.pinned" class="material-symbols-outlined text-[10px]">push_pin</span>
                </div>
            </div>
        </template>
    </main>

    <div x-show="notaExpandida" x-transition x-cloak class="fixed inset-0 bg-black/95 z-[200] flex flex-col p-4">
        <div class="w-full max-w-lg mx-auto rounded-[2.5rem] overflow-hidden flex flex-col h-full shadow-2xl" :class="notaExpandida?.estilo">
            <div class="p-6 flex justify-between items-center border-b border-white/10">
                <span class="text-[10px] font-black uppercase opacity-50" x-text="notaExpandida?.fecha"></span>
                <button @click="cerrarNota()" class="w-10 h-10 bg-black/20 rounded-full flex items-center justify-center text-white active:scale-75"><span class="material-symbols-outlined">close</span></button>
            </div>
            
            <div class="px-6 pt-6">
                <input x-model="notaExpandida.titulo" type="text" placeholder="Título..." class="title-input mb-4">
            </div>

            <textarea x-model="notaExpandida.texto" placeholder="Escribir aquí..." :style="{ fontSize: config.fontSize + 'px' }"></textarea>
            
            <div class="p-6 flex justify-around bg-black/20 border-t border-white/5">
                <button @click="togglePin()" class="active:scale-75"><span class="material-symbols-outlined" :class="notaExpandida?.pinned ? 'text-orange-500' : 'text-white/40'">push_pin</span></button>
                <button @click="alert('Alerta programada')" class="active:scale-75"><span class="material-symbols-outlined text-white/40">notifications</span></button>
                <button @click="borrarNotaRapido()" class="active:scale-75"><span class="material-symbols-outlined text-red-400">delete</span></button>
            </div>
        </div>
    </div>

    <div class="fixed bottom-8 right-6 z-[100]">
        <button @click="nuevaNota()" class="w-16 h-16 bg-orange-600 rounded-2xl flex items-center justify-center shadow-2xl shadow-orange-900/40 active:scale-75 transition-transform">
            <span class="material-symbols-outlined text-black font-black text-4xl">add</span>
        </button>
    </div>

    <div x-show="ui.showSettings" x-transition x-cloak class="fixed inset-0 bg-[#050a0f] z-[300] p-8">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-2xl font-black text-white uppercase italic">Ajustes</h2>
            <button @click="ui.showSettings = false" class="bg-sky-500 text-white px-6 py-2 rounded-full font-black text-xs uppercase">Cerrar</button>
        </div>
        <div class="bg-white/5 p-6 rounded-[2rem] border border-white/10 flex justify-between items-center">
            <span class="font-bold">Negro Puro (AMOLED)</span>
            <button @click="config.pureBlack = !config.pureBlack" class="w-14 h-7 rounded-full p-1 transition-colors" :class="config.pureBlack ? 'bg-sky-500' : 'bg-white/10'">
                <div class="w-5 h-5 bg-white rounded-full transition-transform" :class="config.pureBlack ? 'translate-x-7' : ''"></div>
            </button>
        </div>
    </div>

    <script>
        function notesApp() {
            return {
                notas: [], notaExpandida: null, search: '', selectedDate: null,
                ui: { showMenu: false, showSearch: false, showSettings: false },
                config: { fontSize: 18, pureBlack: false },
                estilos: ['bg-dark-gray', 'bg-dark-orange', 'bg-dark-blue', 'bg-dark-green', 'bg-dark-purple', 'bg-dark-red', 'bg-dark-teal'],

                init() {
                    this.notas = JSON.parse(localStorage.getItem('darkpad_v5_pro_final')) || [];
                },

                get notasFiltradas() {
                    return this.notas.filter(n => {
                        const content = (n.texto + (n.titulo || '')).toLowerCase();
                        const matchesSearch = content.includes(this.search.toLowerCase());
                        const matchesDate = !this.selectedDate || n.fecha.includes(this.selectedDate);
                        return matchesSearch && matchesDate;
                    }).sort((a,b) => b.pinned - a.pinned || b.id - a.id);
                },

                nuevaNota() {
                    const ahora = new Date();
                    const n = { 
                        id: Date.now(), titulo: '', texto: '', 
                        fecha: ahora.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) + ' ' + ahora.toLocaleDateString([], {day:'2-digit', month:'2-digit'}), 
                        estilo: this.estilos[Math.floor(Math.random()*this.estilos.length)], 
                        pinned: false 
                    };
                    this.notas.unshift(n);
                    this.abrirNota(n);
                },

                abrirNota(n) { this.notaExpandida = n; },
                cerrarNota() { this.guardar(); this.notaExpandida = null; },
                guardar() { localStorage.setItem('darkpad_v5_pro_final', JSON.stringify(this.notas)); },
                
                togglePin() { if(this.notaExpandida) this.notaExpandida.pinned = !this.notaExpandida.pinned; this.guardar(); },
                borrarNotaRapido() { 
                    if(confirm("¿Eliminar marco?")) { 
                        this.notas = this.notas.filter(n => n.id !== (this.notaExpandida?.id || -1)); 
                        this.cerrarNota(); 
                    } 
                },
                cambiarTamano() { 
                    const t = [14, 18, 24, 30];
                    this.config.fontSize = t[(t.indexOf(this.config.fontSize) + 1) % t.length];
                },
                volver() { this.selectedDate = null; this.search = ''; this.ui.showMenu = false; },
                
                get last7Days() {
                    const days = [];
                    for(let i=0; i<7; i++) {
                        const d = new Date(); d.setDate(d.getDate() - i);
                        const dStr = d.toLocaleDateString([], {day:'2-digit', month:'2-digit'});
                        days.push({ date: dStr, num: d.getDate(), name: d.toLocaleDateString([], {weekday:'short'}), hasNote: this.notas.some(n => n.fecha.includes(dStr)) });
                    }
                    return days;
                },
                filterByDate(date) { this.selectedDate = (this.selectedDate === date) ? null : date; }
            }
        }
    </script>
</body>
</html>
